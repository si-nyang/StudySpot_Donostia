<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Add Location</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <header class="topbar">
            <div class="container topbar-inner">
                <div class="brand">
                    <h1 align="center"><a href="index.html">Study Spots Donostia</a></h1>
                </div>
            </div>
        </header>
        <main class="section">
            <div class="container">
                <div class="info-box"><h2 class="section-title">Add Location</h2>
                    <form action="addLocation" method="GET">
                        <div style="margin-bottom: 20px;">
                            <label class="eyebrow">Category</label>
                            <input type="text" name="category" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--line);">
                        </div>

                        <div style="margin-bottom: 20px;">
                            <label class="eyebrow">Name</label>
                            <input type="text" name="name" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--line);">
                        </div>

                        <div style="margin-bottom: 20px;">
                            <label class="eyebrow">Description</label>
                            <input type="text" name="description" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--line);">
                        </div>

                        <div style="margin-bottom: 20px;">
                            <label class="eyebrow">Address</label>
                            <input type="text" name="address" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--line);">
                        </div>

                        <div style="margin-bottom: 20px;">
                            <label class="eyebrow">Hours</label>
                            <input type="text" name="hours" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--line);">
                        </div>

                        <div style="margin-bottom: 20px;">
                            <label class="eyebrow">Tags</label>
                            <div class="expect-grid"> 
                                <label class="expect-pill"><input type="checkbox" id="quiet" name="tags" value="quiet"> quiet</label>
                                <label class="expect-pill"><input type="checkbox" id="wifi" name="tags" value="wifi"> wifi</label>
                                <label class="expect-pill"><input type="checkbox" id="library" name="tags" value="library"> library</label>
                                <label class="expect-pill"><input type="checkbox" id="coffee" name="tags" value="coffee"> coffee</label>
                                <label class="expect-pill"><input type="checkbox" id="laptop" name="tags" value="laptop"> laptop friendly</label>
                                <label class="expect-pill"><input type="checkbox" id="food" name="tags" value="food"> food</label>
                                <label class="expect-pill"><input type="checkbox" id="cozy" name="tags" value="cozy"> cozy</label>
                            </div>
                        </div>

                        <div style="margin-bottom: 20px;">
                            <label class="eyebrow">Ratings</label>
                            <input type="text" name="ratings" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--line);">
                        </div>

                        <div style="margin-top: 30px;">
                            <input type="submit" value="Submit" class="full-width-link" style="border: none; cursor: pointer; width: 100%;">
                        </div>    
                    </form>
                </div>
            </div>
        </main>
        
        
    </body>
</html>
