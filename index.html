<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Study Spots</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-wrap">
    <header class="topbar">
      <div class="container topbar-inner">
        <div class="brand">
          <h1>📍 Study Spots</h1>
          <p>Study Spots in San Sebastián</p>
        </div>
      </div>
    </header>

    <main class="container section">
      <h2 class="section-title">San Sebastián Study Spots</h2>
      <p class="muted">Select an option below:</p>

      <div class="index-grid">

        <!-- Card 1 -->
        <a class="preview-card" href="LocationList">
          <div class="preview-body">
            <h3>1. List Page</h3>
            <p>View all available study spots.</p>
            <span class="cta-btn" style="background-color: #1a2a40; color: white; padding: 10px; display: inline-block; border-radius: 4px; text-decoration: none;">
              Open page
            </span>
          </div>
        </a>

        <!-- Card 2 -->
        <a class="preview-card" href="Map.html">
          <div class="preview-body">
            <h3>2. Map Page</h3>
            <p>See spots on the map.</p>
            <span class="cta-btn" style="background-color: #1a2a40; color: white; padding: 10px; display: inline-block; border-radius: 4px; text-decoration: none;">
              Open page
            </span>
          </div>
        </a>

        <!-- Card 3 -->
        <a class="preview-card" href="addLocation">
          <div class="preview-body">
            <h3>3. Add Location</h3>
            <p>Share a new study spot.</p>
            <span class="cta-btn" style="background-color: #1a2a40; color: white; padding: 10px; display: inline-block; border-radius: 4px; text-decoration: none;">
              Open page
            </span>
          </div>
        </a>

      </div>
    </main>
  </div>
</body>
</html>
